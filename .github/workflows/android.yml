name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "assets/**"
      - "pubspec.yaml"
      - "android/**"
      - "scripts/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install ninja + NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Install ninja-build
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Cache Bielik phone GGUF
        uses: actions/cache@v4
        with:
          path: models
          key: bielik-1.5b-v3-q4km-${{ hashFiles('scripts/fetch_ondevice_models.sh') }}

      - name: Cache llama.cpp source
        uses: actions/cache@v4
        with:
          path: ~/.cache/llama.cpp-src
          # bump when cmake flags change (e.g. LLAMA_BUILD_APP)
          key: llama-cpp-src-v2-no-app

      - name: Cache built jniLibs
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/hosted/pub.dev/llm_llamacpp-*/android/src/main/jniLibs
          key: llm-llamacpp-jni-0.1.9-v2-${{ hashFiles('scripts/prepare_llm_android_native.sh') }}

      - name: Fetch phone model + embed in APK assets
        run: |
          chmod +x scripts/*.sh
          ./scripts/fetch_ondevice_models.sh --phone-only
          mkdir -p android/app/src/main/assets/models
          cp -f models/Bielik-1.5B-v3.0-Instruct-Q4_K_M.gguf \
            android/app/src/main/assets/models/
          ls -lh android/app/src/main/assets/models/

      - name: Get dependencies
        run: flutter pub get

      - name: Build llm_llamacpp native libs
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./scripts/prepare_llm_android_native.sh

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/trener-jezykowy.apk
          ls -lh dist/trener-jezykowy.apk

      - uses: actions/upload-artifact@v6
        with:
          name: trener-jezykowy-apk
          path: dist/trener-jezykowy.apk

      - name: Attach to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: android-apk
          name: APK Android — Trener Językowy
          body: |
            APK dla Anielki (Android) — **z lokalnym Bielik 1.5B v3 w środku**.

            1. Pobierz **trener-jezykowy.apk**
            2. Zainstaluj (pozwól na „nieznane źródła” jeśli trzeba)
            3. Nic więcej nie ściągaj — model wypakuje się przy pierwszej rozmowie AI
          files: dist/trener-jezykowy.apk
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
