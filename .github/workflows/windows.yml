name: Windows package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "assets/**"
      - "pubspec.yaml"
      - "windows/**"
      - "scripts/**"
      - ".github/workflows/windows.yml"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Cache models and ollama
        uses: actions/cache@v4
        with:
          path: |
            models
            bundled/ollama
          key: bielik-v3-desktop-ollama-${{ hashFiles('scripts/fetch_ondevice_models.sh') }}

      - name: "Fetch Bielik 1.5B and Ollama for portable ZIP"
        shell: bash
        run: |
          chmod +x scripts/fetch_ondevice_models.sh
          ./scripts/fetch_ondevice_models.sh --phone-only
          mkdir -p bundled/ollama
          if [[ ! -f bundled/ollama/ollama.exe ]]; then
            curl -fsSL -o /tmp/ollama-win.zip \
              "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
            unzip -qo /tmp/ollama-win.zip -d /tmp/ollama-win
            find /tmp/ollama-win -name ollama.exe -exec cp -f {} bundled/ollama/ollama.exe \;
          fi
          test -f models/Bielik-1.5B-v3.0-Instruct-Q4_K_M.gguf
          test -f bundled/ollama/ollama.exe
          ls -lh models/ bundled/ollama/

      - name: Get dependencies
        run: flutter pub get

      - name: Build release
        run: flutter build windows --release

      - name: Pack portable ZIP with LLM
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $out = "Trener-Jezykowy-Windows"
          New-Item -ItemType Directory -Force -Path "$out\models" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out\bundled\ollama" | Out-Null
          Copy-Item -Recurse -Force "$src\*" $out
          Copy-Item -Force "models\*.gguf" "$out\models\"
          if (Test-Path "bundled\ollama\ollama.exe") {
            Copy-Item -Force "bundled\ollama\ollama.exe" "$out\bundled\ollama\"
          }
          @"
          Trener Jezykowy - paczka Windows (z lokalnym AI)

          1. Rozpakuj ZIP (np. Pulpit\Trener-Jezykowy).
          2. Uruchom trener_jezykowy.exe
          3. Nic nie instaluj recznie.

          W srodku: Bielik 1.5B + Ollama. Przy pierwszym starcie z internetem
          aplikacja sama dociagnie pelnego Bielika 11B v3 (bez klikania).
          Bez netu dziala od razu na 1.5B (Ollama importuje GGUF).

          SmartScreen: Wiecej informacji -> Uruchom mimo to.
          "@ | Set-Content -Encoding UTF8 "$out\CZYTAJ-MNIE.txt"
          Compress-Archive -Path $out -DestinationPath "Trener-Jezykowy-Windows.zip" -Force

      - uses: actions/upload-artifact@v6
        with:
          name: Trener-Jezykowy-Windows
          path: Trener-Jezykowy-Windows.zip

      - name: Attach to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: windows-portable
          name: Paczka Windows — Trener Językowy
          body: |
            Paczka dla Anielki (Windows 10/11) — Bielik 1.5B + Ollama w ZIP.

            1. Pobierz **Trener-Jezykowy-Windows.zip**
            2. Rozpakuj
            3. Uruchom `trener_jezykowy.exe`

            Instrukcja: [INSTALL-WINDOWS.md](../blob/main/INSTALL-WINDOWS.md)
          files: Trener-Jezykowy-Windows.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
