name: Windows package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "assets/**"
      - "pubspec.yaml"
      - "windows/**"
      - "scripts/**"
      - ".github/workflows/windows.yml"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Cache models and ollama
        uses: actions/cache@v4
        with:
          path: |
            models
            bundled/ollama
          key: bielik-v3-ollama-full-lib-${{ hashFiles('scripts/fetch_ondevice_models.sh', 'scripts/bundle_ollama_windows.sh') }}

      - name: "Fetch Bielik 1.5B and Ollama for portable ZIP"
        shell: bash
        run: |
          chmod +x scripts/fetch_ondevice_models.sh scripts/bundle_ollama_windows.sh
          ./scripts/fetch_ondevice_models.sh --phone-only
          # Pełny layout Ollamy (exe + lib/) — sam ollama.exe = Windows error 126
          ./scripts/bundle_ollama_windows.sh
          test -f models/Bielik-1.5B-v3.0-Instruct-Q4_K_M.gguf
          test -f bundled/ollama/ollama.exe
          test -f bundled/ollama/lib/ollama/ggml.dll
          ls -lh models/ bundled/ollama/
          du -sh bundled/ollama bundled/ollama/lib

      - name: Get dependencies
        run: flutter pub get

      - name: Patch llm_llamacpp Windows CMake (empty install DESTINATION)
        shell: bash
        run: |
          chmod +x scripts/patch_llm_llamacpp_windows.sh
          ./scripts/patch_llm_llamacpp_windows.sh

      - name: Build release
        run: flutter build windows --release

      - name: Pack portable ZIP with LLM
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $out = "Dialectium-Windows"
          New-Item -ItemType Directory -Force -Path "$out\models" | Out-Null
          New-Item -ItemType Directory -Force -Path "$out\bundled\ollama" | Out-Null
          Copy-Item -Recurse -Force "$src\*" $out
          Copy-Item -Force "models\*.gguf" "$out\models\"
          # Cały sidecar Ollamy (exe + lib/) — bez lib Windows zwraca error 126
          if (Test-Path "bundled\ollama\ollama.exe") {
            Copy-Item -Recurse -Force "bundled\ollama\*" "$out\bundled\ollama\"
          }
          if (-not (Test-Path "$out\bundled\ollama\lib\ollama\ggml.dll")) {
            throw "Brak bundled/ollama/lib/ollama/ggml.dll — Bielik nie wystartuje (error 126)."
          }
          @"
          Dialectium - paczka Windows (z lokalnym AI)

          1. Rozpakuj ZIP (np. Pulpit\Dialectium).
          2. Uruchom dialectium.exe
          3. Nic nie instaluj recznie.

          W srodku: Bielik 1.5B + Ollama (z bibliotekami lib/). Przy pierwszym
          starcie z internetem aplikacja sama dociagnie pelnego Bielika 11B v3.
          Bez netu dziala od razu na 1.5B (Ollama importuje GGUF).

          SmartScreen: Wiecej informacji -> Uruchom mimo to.
          Nie usuwaj folderu bundled\ollama\lib — bez niego AI nie dziala.
          "@ | Set-Content -Encoding UTF8 "$out\CZYTAJ-MNIE.txt"
          Compress-Archive -Path $out -DestinationPath "Dialectium-Windows.zip" -Force

      - uses: actions/upload-artifact@v6
        with:
          name: Dialectium-Windows
          path: Dialectium-Windows.zip

      - name: Attach to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: windows-portable
          name: Dialectium — Windows
          body: |
            Paczka Windows (10/11) — Bielik 1.5B + Ollama w ZIP.

            1. Pobierz **Dialectium-Windows.zip**
            2. Rozpakuj
            3. Uruchom `dialectium.exe`

            **Ważne:** w ZIP musi być folder `bundled/ollama/lib/` (biblioteki).
            Stare paczki z samym `ollama.exe` dawały błąd 126 — ta jest naprawiona.

            Instrukcja: [INSTALL-WINDOWS.md](../blob/main/INSTALL-WINDOWS.md)
          files: Dialectium-Windows.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
