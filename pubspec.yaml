name: dialectium
description: Dialectium — nauka słówek
publish_to: "none"
version: 0.0.19+25

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^6.8.1
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  llm_llamacpp: ^0.1.9
  model_viewer_plus: ^1.10.0
  # Desktop Linux/Windows/macOS: Chromium WebGL (WebKitGTK na NVIDIA = martwy)
  webview_cef: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  path_provider_platform_interface: ^2.1.2

flutter:
  uses-material-design: true
  assets:
    - assets/data/baza.json
    - assets/data/baza_screenshot.json
    - assets/data/portal.json
    - assets/data/on_device_tutor.json
    - assets/images/kitten_book.png
    - assets/images/kicia_base.png
    - assets/images/busy_cat.gif
    - assets/audio/
    - assets/models3d/
    - assets/fonts/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

